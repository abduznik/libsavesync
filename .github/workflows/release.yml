name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Gate: full test suite must pass on every platform before any packaging
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: cc
          - os: windows-latest
            cc: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build library and IPC binary
        run: make static ipc
        env:
          CC: ${{ matrix.cc }}

      - name: Run full test suite
        run: make test
        env:
          CC: ${{ matrix.cc }}

  # Build and package on each platform natively
  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            name: linux_x86_64
            artifact: libsavesync-${{ github.ref_name }}-linux-x86_64
          - os: macos-latest
            cc: cc
            name: macos_arm64
            artifact: libsavesync-${{ github.ref_name }}-macos-arm64
          - os: windows-latest
            cc: gcc
            name: windows_x86_64
            artifact: libsavesync-${{ github.ref_name }}-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build library and IPC binary
        run: make static ipc
        env:
          CC: ${{ matrix.cc }}

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p staging/lib staging/bin staging/include
          cp build/libsavesync.a staging/lib/
          cp include/savesync.h staging/include/
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp build/savesync-ipc.exe staging/bin/ 2>/dev/null || cp build/savesync-ipc staging/bin/
          else
            cp build/savesync-ipc staging/bin/
          fi
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 1

  # Collect all platform artifacts and create the GitHub Release
  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
