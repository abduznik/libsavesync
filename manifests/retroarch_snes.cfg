# RetroArch / Snes9x (Super Nintendo) — Save Manifest
# Source: Freegosy retroarch_save_strategy.dart
#
# Identification: ROM stem matching — saves are named {romStem}.srm
#   in the RetroArch saves/Snes9x/ directory. No in-file header parsing.
#
# Save shape: File (single .srm per game)
# Path convention: {game_id}/{platform}/ for save organization
#
# RetroArch stores SNES saves in:
#   {retroarch_dir}/saves/Snes9x/{romStem}.srm
# where romStem is the ROM filename without extension.
#
# Freegosy matches by ROM stem (exact match, then fuzzy word match).
# Option B (decided): caller always supplies game_id derived from ROM filename.
# Save files are named {romStem}.{ext} in this directory.
# Caller should set game_id to the ROM filename without extension.
# See docs/stem-matching-proposal.md for the decision rationale.

platform=snes
emulator=retroarch_snes9x
shape=file
identity=none
save_path_template={game_id}/{platform}
