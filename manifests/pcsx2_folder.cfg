# PCSX2 — Folder Mode (Per-Game Directory Save Format)
# Source: Freegosy pcsx2_save_strategy.dart
#
# PCSX2 supports two coexisting memory card modes, user-selectable in
# Settings > Memory Cards:
#   - File mode (default): stores all saves in one .ps2 file (see pcsx2_file.cfg)
#   - Folder mode (opt-in): stores one file per game, but isn't compatible
#     with all games
#
# This manifest covers FOLDER MODE. Identification uses a text pattern
# to extract the serial from SYSTEM.CNF in the save directory.
# Pattern: BOOT2 = cdrom0:\{ID:11};1
# Normalization: strip "." and ";", replace "_" with "-"
# Example: "BOOT2 = cdrom0:\TEST_000.01;1" → "TEST-00001"
#
# Save shape: Directory (per-game folder saves in saves/{Serial}/)
# Path convention: {game_id}/{platform}/ for per-game folders

platform=ps2
emulator=pcsx2
shape=directory
identity=text_pattern
text_pattern=BOOT2 = cdrom0:\{ID:11};1
text_pattern_source=SYSTEM.CNF
text_pattern_offset=0
text_pattern_length=0
normalize_strip=.;
normalize_replace=_-
save_path_template={game_id}/{platform}
