# Dolphin (GameCube) — Save Manifest
# Source: Freegosy dolphin_save_strategy.dart
#
# Identification: Game ID from ROM header — 4 ASCII bytes at offset 0x00
#   for ISO format. Freegosy also supports RVZ (offset 0x58), but
#   this manifest uses ISO offset for the common case.
#
# Save shape: File (.gci files in GC/{Region}/Card A/)
# Path convention: {game_id}/{platform}/ for save organization
#
# Dolphin stores GC saves in:
#   {userDir}/GC/{Region}/Card A/{GameID}*.gci
# where Region is USA/EUR/JAP and GameID is a 4-char alphanumeric code
# extracted from the ROM header.
#
# Real Dolphin GC game IDs (verified against Freegosy code):
#   TEST01 = Test Game Alpha (USA)
#   XXXX01 = Test Game Beta (USA)
#   ZZZZ99 = Test Game Gamma (USA)

platform=gamecube
emulator=dolphin
shape=file
identity=rom_header
rom_header_offset=0
rom_header_length=4
save_path_template={game_id}/{platform}
