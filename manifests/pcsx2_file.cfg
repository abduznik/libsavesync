# PCSX2 — File Mode (Shared Memcard Format)
# Source: Freegosy pcsx2_save_strategy.dart (Layer 2: shared memcards)
#
# PCSX2 supports two coexisting memory card modes, user-selectable in
# Settings > Memory Cards:
#   - File mode (default): stores all saves in one .ps2 file (this manifest)
#   - Folder mode (opt-in): stores one file per game (see pcsx2_folder.cfg)
#
# A shared memcard multiplexes many games into one opaque binary file.
# libsavesync's one-registration-one-save model treats the entire memcard
# as a single opaque unit — per-game extraction from within a memcard
# image is explicitly out of scope.
#
# Save shape: File (single .ps2 memcard image)
# Path convention: {game_id}/{platform}/ for save organization
# Note: the actual memcard path is {emulator_dir}/memcards/Mcd001.ps2
#   but libsavesync tracks the live_path provided by the caller.

platform=ps2
emulator=pcsx2
shape=file
identity=none
save_path_template={game_id}/{platform}
