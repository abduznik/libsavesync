# RPCS3 (PlayStation 3) — Save Manifest
#
# Identification: Directory-name pattern within dev_hdd0/home/00000001/savedata/
#   Each game has one or more directories in savedata/ named
#   <GameID><Suffix>, e.g.:
#     BLUS30443DEMONSS005  (game + save type)
#     BLUS30826F           (game + profile F)
#     BLUS30826L01         (game + save slot L01)
#     BLES00676-SAW        (game + separator + save name)
#
#   The game ID is always the first 9 characters: 4-letter region
#   code (BLUS/BLES/etc.) + 5-digit game number. The suffix is
#   variable: save types (SYSTEM, DAT), profiles (F, L01),
#   or compound names (DEMONSS005, NAUGHTYBEARSAVEGAME).
#   Some suffixes start with a hyphen separator.
#
#   libsavesync extracts the 9-char game ID by matching the directory
#   basename with the pattern {ID:9}. The text_pattern_source=_dirname
#   directive tells the pattern matcher to match against live_path's
#   own basename rather than reading file content.
#
#   PARAM.SFO inside each directory contains SAVEDATA_DIRECTORY matching
#   the full directory name (including suffix), confirming the directory
#   name as the authoritative identifier.
#
# Save shape: Directory (each game is one or more folders in savedata/)
# Path convention: {game_id}/{platform}/ for per-game save organization

platform=ps3
emulator=rpcs3
shape=directory
identity=text_pattern
text_pattern={ID:9}
text_pattern_source=_dirname
save_path_template={game_id}/{platform}
