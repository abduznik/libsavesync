# Ryujinx (Nintendo Switch) — Save Manifest
# Source: Freegosy ryujinx_save_strategy.dart
#
# Identification: Title ID from ROM via text pattern scan.
#   Freegosy reads the first 256KB of the ROM and scans for a cnmt
#   filename pattern: 01[0-9A-Fa-f]{14}.cnmt
#
#   This is expressible as a text_pattern:
#     {ID:16}.cnmt
#   which captures the full 16-char title ID (including the "01" prefix)
#   before ".cnmt". The cnmt filename appears as contiguous ASCII bytes
#   within the NSP/XCI ROM's PFS0 directory structure.
#
#   After extraction, the title ID is normalized: if 16 chars, the
#   last 3 are replaced with "000" (Freegosy convention).
#
# Save shape: Directory (per-game save folders under userId/)
# Path convention: {game_id}/{platform}/ for save organization
#
# Ryujinx save structure:
#   bis/user/save/{userId}/{slotId}/
# where userId is a 16-char hex string (user profile) and slotId
# is a numeric index. Save files within slots are .sav files.
#
# The userId is determined at runtime by scanning for the most
# recently active user profile — this is emulator-state-dependent
# and cannot be determined from the ROM alone.

platform=switch
emulator=ryujinx
shape=directory
identity=text_pattern
text_pattern={ID:16}.cnmt
text_pattern_offset=0
text_pattern_length=262144
normalize_strip=
normalize_replace=
save_path_template={game_id}/{platform}
